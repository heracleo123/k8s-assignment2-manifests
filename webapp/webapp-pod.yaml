apiVersion: v1
kind: Pod
metadata:
  name: webapp-pod
  namespace: webapp-ns
  labels:
    app: employees
    tier: frontend
spec:
  imagePullSecrets:
  - name: regcred
  containers:
  - name: webapp
    image: 334566130486.dkr.ecr.us-east-1.amazonaws.com/webapp:latest
    ports:
    - containerPort: 8080
    env:
    - name: DB_HOST
      value: "mysql-service.mysql-ns.svc.cluster.local"
    - name: DB_USER
      value: "root"
    - name: DB_PASSWORD
      value: "password123"
